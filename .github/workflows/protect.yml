name: protect
on: { push: { branches: [main] } }

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      # 🔧 SYSTEM DEPENDENCIES (fixes sf, ragg, textshaping, curl, etc.)
      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev

      # 📦 R PACKAGES
      - name: Install R dependencies
        run: |
          Rscript -e 'install.packages(c(
            "knitr",
            "rmarkdown",
            "tidyverse",
            "leaflet",
            "wildrtrax",
            "sf",
            "ggridges",
            "kableExtra",
            "plotly",
            "DT",
            "vegan",
            "ggrepel"
          ), repos="https://cloud.r-project.org")'

      # 🧱 BUILD QUARTO
      - run: quarto render mushkegowuk.qmd

      # 🔐 PASSWORD PROTECT OUTPUT HTML
      - run: npm i -g staticrypt && staticrypt mushkegowuk.html -p "${{ secrets.SITE_PASSWORD }}"

      # 🚀 DEPLOY TO GH-PAGES
      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
