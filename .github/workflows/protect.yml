name: protect

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: quarto-dev/quarto-actions/setup@v2

      - uses: r-lib/actions/setup-r@v2

      - name: System dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libharfbuzz-dev \
            libfribidi-dev \
            libudunits2-dev \
            libgdal-dev \
            libgeos-dev \
            libproj-dev

      - name: Install R dependencies
        run: |
          Rscript -e 'options(repos = c(CRAN = "https://cloud.r-project.org"))'
          Rscript -e 'install.packages("leaflet", dependencies = TRUE)'
          Rscript -e 'install.packages("remotes", dependencies = TRUE)'
          Rscript -e 'install.packages(c(
            "knitr",
            "rmarkdown",
            "dplyr",
            "tidyr",
            "purrr",
            "lubridate",
            "stringr",
            "tibble",
            "ggplot2",
            "readr",
            "sf",
            "ggridges",
            "kableExtra",
            "plotly",
            "DT",
            "vegan",
            "ggrepel"
          ), dependencies = TRUE)'
          Rscript -e 'remotes::install_github("ABbiodiversity/wildrtrax")'

      - run: quarto render mushkegowuk.qmd

      - run: npm i -g staticrypt && staticrypt mushkegowuk.html -p "${{ secrets.SITE_PASSWORD }}"

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
